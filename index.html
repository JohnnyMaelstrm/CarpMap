<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carp Stocking Map · Finland</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --border: #1e2637;
    --accent: #FF8C00;
    --accent2: #2196F3;
    --text: #e8eaf0;
    --muted: #6b7a99;
    --fish: #FF8C00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .stat-val {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #map {
    flex: 1;
    background: #111;
  }

  .sidebar {
    width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .search-wrap {
    position: relative;
  }

  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent); }

  .lake-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .lake-list::-webkit-scrollbar { width: 4px; }
  .lake-list::-webkit-scrollbar-track { background: transparent; }
  .lake-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .lake-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }

  .lake-item:hover { background: var(--bg); border-color: var(--border); }
  .lake-item.active { background: var(--bg); border-color: var(--accent); }
  .lake-item.confirmed-item { border-color: rgba(255,215,0,0.4); }

  .lake-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lake-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge {
    background: var(--accent);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
  }

  .badge-blue {
    background: var(--accent2);
    color: #fff;
  }

  .status-bar {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .dot.done { background: #4caf50; }
  .dot.error { background: #f44336; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    color: var(--text) !important;
    padding: 0 !important;
    min-width: 260px;
  }

  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; top: 10px !important; right: 12px !important; }
  .leaflet-popup-content { margin: 0 !important; }

  .popup-inner { padding: 16px; }

  .popup-lake-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .popup-kunta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .popup-coords {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
    padding: 6px 8px;
    background: var(--bg);
    border-radius: 4px;
    cursor: pointer;
    user-select: all;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .popup-coords:hover { background: var(--border); }
  .copy-hint { font-size: 9px; color: var(--accent); }

  .popup-divider { height: 1px; background: var(--border); margin: 10px 0; }

  .popup-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .popup-key { font-size: 11px; color: var(--muted); }
  .popup-val { font-size: 11px; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; }

  .popup-history {
    max-height: 140px;
    overflow-y: auto;
    margin-top: 8px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .popup-history::-webkit-scrollbar { width: 3px; }
  .popup-history::-webkit-scrollbar-thumb { background: var(--border); }

  .hist-row {
    display: grid;
    grid-template-columns: 50px 60px 1fr;
    gap: 4px;
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    align-items: center;
  }

  .hist-row:last-child { border-bottom: none; }
  .hist-year { color: var(--accent); font-weight: 600; }
  .hist-kpl { color: var(--text); }

  .popup-links {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .popup-link {
    flex: 1;
    padding: 6px 8px;
    border-radius: 5px;
    text-decoration: none;
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: opacity 0.15s;
    border: none;
    cursor: pointer;
    min-width: 80px;
  }

  .popup-link:hover { opacity: 0.8; }
  .link-gmap { background: #4285f4; color: #fff; }
  .link-copy { background: var(--border); color: var(--text); }
  .link-catch { background: var(--border); color: var(--text); }
  .link-catch.confirmed { background: #4CAF50; color: #fff; }

  /* Filter bars */
  .filter-row {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .filter-btn {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  .catch-filter-btn {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #FFD700;
    background: transparent;
    color: #FFD700;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .catch-filter-btn.active { background: #FFD700; color: #000; font-weight: 700; }

  /* MOBILE */
  @media (max-width: 768px) {
    header {
      padding: 8px 12px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .logo { font-size: 18px; }
    .subtitle { display: none; }
    .stats-bar { gap: 12px; margin-left: auto; }
    .stat-val { font-size: 14px; }
    .stat-label { font-size: 9px; }

    .layout { flex-direction: column-reverse; }
    #map { flex: 1; min-height: 50vh; }
    .sidebar {
      width: 100%;
      height: 45vh;
      border-left: none;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .filter-row { padding: 6px 10px; gap: 4px; }
    .filter-btn { font-size: 10px; padding: 3px 8px; }
    .lake-item { padding: 8px 10px; }
    .lake-name { font-size: 12px; }
    .lake-meta { font-size: 9px; }

    .leaflet-popup-content-wrapper {
      min-width: 280px !important;
      max-width: 90vw !important;
    }
    .popup-inner { padding: 12px; }
    .popup-lake-name { font-size: 14px; }
    .popup-key, .popup-val { font-size: 12px; }
    .popup-coords { font-size: 11px; }
    .hist-row { font-size: 11px; }
    .popup-link { font-size: 11px; padding: 8px; }
    .popup-history { max-height: 120px; }
    .leaflet-top.leaflet-left { top: 8px; left: 8px; }
    .leaflet-control-zoom a { width: 32px; height: 32px; line-height: 32px; font-size: 18px; }
  }
</style>
</head>

</div>

, "lat": 61.66087, "lng": 21.86456, "istutukset": [{"vuosi": 1997, "pvm": "1997-10-03", "kpl": 220, "ika": "Kaksivuotias", "paino_g": 310.0}]}, {"jarvinumero": "24.033.1.015", "nimi": "Lammenjärvi", "kunta": "SALO", "region": "Varsinais-Suomi", "lat": 60.35279, "lng": 23.69715, "istutukset": [{"vuosi": 2000, "pvm": "2000-06-14", "kpl": 100, "ika": "Kaksivuotias", "paino_g": 400.0}]}, {"jarvinumero": "23.073.1.003", "nimi": "Arimaa", "kunta": "SOMERO", "region": "Varsinais-Suomi", "lat": 60.55902, "lng": 23.83883, "istutukset": [{"vuosi": 2002, "pvm": "2002-06-11", "kpl": 150, "ika": "Kaksivuotias", "paino_g": 400.0}]}, {"jarvinumero": "", "nimi": "Saaristomeri", "kunta": "NAANTALI", "region": "Varsinais-Suomi", "lat": 60.0566679, "lng": 21.7945074, "istutukset": [{"vuosi": 2012, "pvm": "2012-06-10", "kpl": 107, "ika": "Kaksivuotias", "paino_g": 300.0}]}];

// ---- MAP INIT ----
const map = L.map('map', {
  center: [61.2, 23.2],
  zoom: 8,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ---- STATE ----
const markers = {};
let activeItem = null;
let geocodedCount = 0;
let filterKunta = 'all';
let filterRegion = 'all';
let filterCatchOnly = false;

// ---- CONFIRMED CATCHES (localStorage) ----
let confirmed = {};
try {
  confirmed = JSON.parse(localStorage.getItem('carpmap_confirmed') || '{}');
} catch(e) { confirmed = {}; }

function saveConfirmed() {
  try { localStorage.setItem('carpmap_confirmed', JSON.stringify(confirmed)); } catch(e) {}
}

function updateConfirmedStat() {
  document.getElementById('stat-confirmed').textContent = Object.keys(confirmed).length;
}

window.toggleConfirmed = function(key) {
  if (confirmed[key]) {
    delete confirmed[key];
  } else {
    confirmed[key] = { date: new Date().toISOString().slice(0, 10) };
  }
  saveConfirmed();
  updateConfirmedStat();

  // Update marker icon
  const m = markers[key];
  if (m) {
    const lake = LAKES_DATA.find(l => (l.jarvinumero + '_' + l.region) === key);
    if (lake) {
      m.marker.setIcon(createMarkerIcon(lake, markerSize(lake), !!confirmed[key]));
    }
  }

  // Re-render popup button without closing it
  const btn = document.querySelector('.catch-popup-btn[data-key="' + key + '"]');
  if (btn) {
    const isNow = !!confirmed[key];
    btn.textContent = isNow ? '✅ Saalis merkitty!' : '🎣 Merkitse saalisjärvi';
    btn.style.background = isNow ? '#4CAF50' : 'var(--border)';
    btn.style.color = isNow ? '#fff' : 'var(--text)';
  }

  buildList(document.getElementById('search').value);
};

// ---- REGION COLORS ----
const REGION_COLORS = {
  'Pirkanmaa':                        '#FF8C00',
  'Varsinais-Suomi':                  '#2196F3',
  'Lounais-Suomen elinvoimakeskus':   '#4CAF50',
  'Itä-Suomen elinvoimakeskus':       '#F44336',
};
function regionColor(lake) {
  return REGION_COLORS[lake.region] || '#aaa';
}

// ---- UTILS ----
function totalKpl(lake) {
  return lake.istutukset.reduce((s, i) => s + (i.kpl || 0), 0);
}
function latestVuosi(lake) {
  return Math.max(...lake.istutukset.map(i => i.vuosi));
}
function cleanNimi(nimi) {
  return nimi.replace(/\s*\(N60.*?\)x?\d*/g, '').replace(/\s*\(kesk\..*?\)/g, '').trim();
}

// ---- MARKER SIZE ----
function markerSize(lake) {
  const kpl = totalKpl(lake);
  if (kpl > 5000) return 18;
  if (kpl > 2000) return 14;
  if (kpl > 500) return 11;
  return 8;
}

function createMarkerIcon(lake, size, isConfirmed) {
  const color = regionColor(lake);
  const border = isConfirmed ? '3px solid #FFD700' : '2px solid #fff';
  const glow = isConfirmed
    ? `0 0 ${size}px rgba(255,215,0,0.8), 0 0 ${size*2}px rgba(255,215,0,0.4)`
    : `0 0 ${size}px rgba(0,0,0,0.5)`;
  const star = isConfirmed
    ? `<div style="position:absolute;top:-10px;right:-10px;font-size:14px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.8));">⭐</div>`
    : '';
  return L.divIcon({
    className: '',
    html: `<div style="position:relative;width:${size*2}px;height:${size*2}px;">
      <div style="
        width:100%; height:100%;
        background: ${color};
        border: ${border};
        border-radius: 50%;
        box-shadow: ${glow};
      "></div>
      ${star}
    </div>`,
    iconSize: [size*2, size*2],
    iconAnchor: [size, size],
    popupAnchor: [0, -size - 6],
  });
}

// ---- POPUP ----
function buildPopup(lake, lat, lng) {
  const totalFish = totalKpl(lake);
  const years = [...new Set(lake.istutukset.map(i => i.vuosi))].sort();
  const displayNimi = cleanNimi(lake.nimi);
  const latStr = lat.toFixed(5);
  const lngStr = lng.toFixed(5);
  const coordStr = `${latStr}, ${lngStr}`;
  const gmapUrl = `https://www.google.com/maps?q=${latStr},${lngStr}&z=14`;
  const geoKey = lake.jarvinumero + '_' + lake.region;
  const isConf = !!confirmed[geoKey];

  const histRows = lake.istutukset.map(i => `
    <div class="hist-row">
      <span class="hist-year">${i.vuosi}</span>
      <span class="hist-kpl">${i.kpl} fish</span>
      <span style="color:var(--muted);font-size:9px;">${i.ika || ''}</span>
    </div>
  `).join('');

  const color = regionColor(lake);
  const catchDate = isConf && confirmed[geoKey] ? confirmed[geoKey].date : '';

  return `<div class="popup-inner">
    <div class="popup-lake-name" style="color:${color}">${isConf ? '⭐ ' : ''}${displayNimi}</div>
    <div class="popup-kunta">${lake.kunta} · <span style="color:${color}">${lake.region}</span> · ${lake.jarvinumero || 'no lake ID'}</div>

    <div class="popup-coords" onclick="copyCoords('${coordStr}', this)" title="Click to copy">
      <span>${latStr}, ${lngStr}</span>
      <span class="copy-hint">📋 copy</span>
    </div>

    ${isConf ? `<div style="background:rgba(76,175,80,0.15);border:1px solid #4CAF50;border-radius:5px;padding:5px 8px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#4CAF50;">✅ Saalis merkitty ${catchDate}</div>` : ''}

    <div class="popup-row">
      <span class="popup-key">Total stocked</span>
      <span class="popup-val">${totalFish.toLocaleString('en')} fish</span>
    </div>
    <div class="popup-row">
      <span class="popup-key">Stocking events</span>
      <span class="popup-val">${lake.istutukset.length} times</span>
    </div>
    <div class="popup-row">
      <span class="popup-key">Years</span>
      <span class="popup-val">${years[0]}–${years[years.length-1]}</span>
    </div>

    <div class="popup-divider"></div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;">Stocking history</div>
    <div class="popup-history">${histRows}</div>

    <div class="popup-links">
      <a class="popup-link link-gmap" href="${gmapUrl}" target="_blank">Google Maps</a>
      <button class="popup-link link-copy" onclick="copyCoords('${coordStr}', this)">Copy coords</button>
      <button class="popup-link catch-popup-btn ${isConf ? 'confirmed' : ''}"
        data-key="${geoKey}"
        style="background:${isConf ? '#4CAF50' : 'var(--border)'};color:${isConf ? '#fff' : 'var(--text)'};width:100%;margin-top:2px;"
        onclick="toggleConfirmed('${geoKey}')">
        ${isConf ? '✅ Saalis merkitty!' : '🎣 Merkitse saalisjärvi'}
      </button>
    </div>
  </div>`;
}

window.copyCoords = function(coords, el) {
  navigator.clipboard.writeText(coords).then(() => {
    if (el.tagName === 'BUTTON') {
      const orig = el.textContent;
      el.textContent = '✓ Copied!';
      setTimeout(() => el.textContent = orig, 1500);
    } else {
      el.querySelector('.copy-hint').textContent = '✓ Copied!';
      setTimeout(() => el.querySelector('.copy-hint').textContent = '📋 copy', 1500);
    }
  });
};

// ---- SIDEBAR LIST ----
const lakeList = document.getElementById('lake-list');

function buildList(filter = '') {
  lakeList.innerHTML = '';
  const q = filter.toLowerCase();
  const filtered = LAKES_DATA.filter(l => {
    const geoKey = l.jarvinumero + '_' + l.region;
    if (filterCatchOnly && !confirmed[geoKey]) return false;
    if (filterRegion !== 'all' && l.region !== filterRegion) return false;
    if (filterKunta !== 'all' && l.kunta !== filterKunta) return false;
    const name = cleanNimi(l.nimi).toLowerCase();
    return name.includes(q) || l.kunta.toLowerCase().includes(q) || l.region.toLowerCase().includes(q);
  });

  filtered.forEach(lake => {
    const geoKey = lake.jarvinumero + '_' + lake.region;
    const isConf = !!confirmed[geoKey];
    const div = document.createElement('div');
    div.className = 'lake-item' + (isConf ? ' confirmed-item' : '');
    const displayNimi = cleanNimi(lake.nimi);
    const kpl = totalKpl(lake);
    const geo = markers[geoKey];
    const color = regionColor(lake);
    div.innerHTML = `
      <div class="lake-name">${isConf ? '⭐ ' : ''}${displayNimi}</div>
      <div class="lake-meta">
        <span>${lake.kunta}</span>
        <span class="badge" style="background:${color};color:#fff">${kpl.toLocaleString('en')} fish</span>
        <span class="badge badge-blue">${lake.istutukset.length}×</span>
        ${isConf ? `<span style="color:#FFD700;font-size:9px;">${confirmed[geoKey].date}</span>` : ''}
        ${!geo ? '<span style="color:#f44336;font-size:9px;">●</span>' : ''}
      </div>
    `;
    div.addEventListener('click', () => {
      document.querySelectorAll('.lake-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      activeItem = geoKey;
      const g = markers[geoKey];
      if (g) {
        map.flyTo([g.lat, g.lng], 13, { duration: 1.2 });
        setTimeout(() => g.marker.openPopup(), 1300);
      }
    });
    lakeList.appendChild(div);
  });
}

document.getElementById('search').addEventListener('input', e => buildList(e.target.value));

// ---- REGION FILTERS ----
const regionRow = document.getElementById('region-row');
const regions = [...new Set(LAKES_DATA.map(l => l.region))].sort();

const allRegionBtn = document.createElement('button');
allRegionBtn.className = 'filter-btn active';
allRegionBtn.textContent = 'Kaikki';
regionRow.appendChild(allRegionBtn);
allRegionBtn.addEventListener('click', () => {
  regionRow.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
  });
  allRegionBtn.classList.add('active');
  filterRegion = 'all';
  buildList(document.getElementById('search').value);
});

regions.forEach(r => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = r.replace(' elinvoimakeskus', '').replace('Lounais-Suomen', 'Lounais').replace('Itä-Suomen', 'Itä');
  btn.title = r;
  const color = REGION_COLORS[r] || '#aaa';
  btn.style.borderColor = color;
  btn.addEventListener('click', () => {
    regionRow.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('active');
      b.style.background = '';
      b.style.color = '';
    });
    btn.classList.add('active');
    btn.style.background = color;
    btn.style.color = '#000';
    filterRegion = r;
    buildList(document.getElementById('search').value);
  });
  regionRow.appendChild(btn);
});

// Caught-only button
const catchBtn = document.createElement('button');
catchBtn.className = 'catch-filter-btn';
catchBtn.textContent = '⭐ Vain saalisjärvet';
catchBtn.style.marginLeft = 'auto';
regionRow.appendChild(catchBtn);
catchBtn.addEventListener('click', () => {
  filterCatchOnly = !filterCatchOnly;
  catchBtn.classList.toggle('active', filterCatchOnly);
  buildList(document.getElementById('search').value);
});

// ---- MUNICIPALITY DROPDOWN ----
const kunnat = [...new Set(LAKES_DATA.map(l => l.kunta))].sort();
const filterRow = document.getElementById('filter-row');
filterRow.innerHTML = '';
const select = document.createElement('select');
select.style.cssText = 'width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:Syne,sans-serif;font-size:12px;outline:none;cursor:pointer;';
const allOpt = document.createElement('option');
allOpt.value = 'all';
allOpt.textContent = 'Kaikki kunnat';
select.appendChild(allOpt);
kunnat.forEach(k => {
  const opt = document.createElement('option');
  opt.value = k;
  opt.textContent = k.charAt(0) + k.slice(1).toLowerCase();
  select.appendChild(opt);
});
select.addEventListener('change', e => {
  filterKunta = e.target.value;
  buildList(document.getElementById('search').value);
});
filterRow.appendChild(select);

// ---- RENDER ----
function renderMapInstantly() {
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const statGeocoded = document.getElementById('stat-geocoded');

  LAKES_DATA.forEach(lake => {
    if (lake.lat && lake.lng) {
      const geoKey = lake.jarvinumero + '_' + lake.region;
      const isConf = !!confirmed[geoKey];
      const size = markerSize(lake);
      const marker = L.marker([lake.lat, lake.lng], {
        icon: createMarkerIcon(lake, size, isConf)
      }).addTo(map);

      marker.bindPopup(() => buildPopup(lake, lake.lat, lake.lng), {
        maxWidth: 320,
        className: 'dark-popup'
      });

      markers[geoKey] = { lat: lake.lat, lng: lake.lng, marker };
      geocodedCount++;
    }
  });

  statGeocoded.textContent = geocodedCount;
  updateConfirmedStat();
  statusDot.className = 'dot done';
  statusText.textContent = `Valmis — ${geocodedCount}/${LAKES_DATA.length} järveä kartalla`;
  buildList();
}

renderMapInstantly();
</script>
</body>
